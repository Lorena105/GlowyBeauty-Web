<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <style>
            body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #000;
            color: #fff;
            padding: 10px 20px;
            text-align: center;
            font-size: 40px;
            font-family: Edwardian Script ITC;
            
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0;
            display: flex;
            gap: 20px;
        }

        .left-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 0; 
        }

        .product-image {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
            margin-bottom: 10px; 
        }

        .right-column {
            flex: 2;
            background-color: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-top: 0; 
            width: 1600px;
        }

        .stars {
            font-size: 1.2em;
            color: #db0606;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 40px;
        }

        .button {
            flex: 1;
            padding: 10px;
            background-color: #000;
            color: #fff;
            text-align: center;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .button:hover {
            background-color: #444;
        }
        a {
            text-decoration: none;
            color: inherit; 
        }
    </style>
    </style>
</head>
<body>

<header>Dolce & Gabbana</header>

<div class="container">
 
    <div class="left-column">
        <img src="foto23.webp" alt="Gabbana" class="product-image">
        <img src="foto24.jpg" alt="Gabbana" class="product-image">
        
    </div>

    <div class="right-column">
        <h1>DOLCE & GABBANA</h1>
        <p>A vibrant fragrance with sense of luxury</p>
        <p style="color: red; font-weight: bold; font-size: 20px;">12.000 ALL</p>
    
        <div>
            <h3>Ingredients:</h3>
            <ul>
                <li>Bergamot</li>
                <li>Madonna Lily</li>
                <li>Musk</li>
                <li>Plum</li>
                <li>Mandarin</li>
                <li>Peach</li>
            </ul>
        </div>

        <div>
            <h3>Reviews:</h3>
            <p>Incredible fragrance—works beautifully day or night!</p>
            <td><span class="stars">
                ★★★★★
                </span>
                <span class="empty-star"></span>
            </td>
        </div>

        <div >
            <h3>Leave a Comment:</h3>
            <textarea style=" width: 100%; height: 60px;" placeholder="Write your review here..."></textarea>
            <button class="button">Submit Comment</button>
        </div>
     
        <div class="button-group"> 
            <div class="button"><a href="buynow.html">Shop Now</div></a>
            <div class="button">Add To Cart</div>
        </div>
    
    </div>
</div>
</body>
</html>
